<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grubhub Alumni Placement Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#18181f;--border:#2a2a35;--accent:#c8f542;--accent2:#42b4f5;--warn:#f59e0b;--danger:#ef4444;--text:#e8e8f0;--muted:#6b6b80;--strong:#00ff88;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,245,66,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(200,245,66,.015) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 24px 80px;}
header{padding:40px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px;}
.logo-badge{background:var(--accent);color:#0a0a0f;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;letter-spacing:2px;padding:4px 10px;text-transform:uppercase;margin-bottom:8px;display:inline-block;}
h1{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;line-height:1.05;letter-spacing:-1px;}
h1 span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:13px;margin-top:10px;}
.tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);padding:4px;margin-bottom:32px;width:fit-content;}
.tab{padding:8px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;}
.tab.active{background:var(--accent);color:#0a0a0f;font-weight:500;}
.panel{display:none;}.panel.active{display:block;}
.section-heading{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-heading::after{content:'';flex:1;height:1px;background:var(--border);}
label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:500;display:block;margin-bottom:6px;}
label .hint{color:var(--muted);text-transform:none;letter-spacing:0;font-size:11px;margin-left:8px;}
textarea,select,input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:12px 14px;resize:vertical;outline:none;transition:border .15s;width:100%;}
textarea:focus,select:focus{border-color:var(--accent);}
select{resize:none;cursor:pointer;}
select option{background:var(--surface2);}
.field-group{display:flex;flex-direction:column;gap:0;margin-bottom:20px;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:700px){.input-grid{grid-template-columns:1fr;}}
.action-bar{display:flex;gap:12px;align-items:center;margin-top:24px;flex-wrap:wrap;}
.btn-primary{background:var(--accent);color:#0a0a0f;border:none;padding:14px 32px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.btn-primary:hover{background:#d9ff55;transform:translateY(-1px);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border);padding:14px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-secondary:hover{border-color:var(--muted);color:var(--text);}
.btn-run-all{background:var(--surface2);color:var(--accent2);border:1px solid var(--accent2);padding:14px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-run-all:hover{background:rgba(66,180,245,.1);}
.btn-run-all:disabled{opacity:.4;cursor:not-allowed;}
.loading-bar{height:2px;background:var(--border);position:relative;overflow:hidden;margin-top:16px;display:none;}
.loading-bar.active{display:block;}
.loading-bar::after{content:'';position:absolute;left:-40%;width:40%;height:100%;background:var(--accent);animation:slide 1s ease-in-out infinite;}
@keyframes slide{to{left:140%;}}
.status-msg{font-size:12px;color:var(--muted);margin-top:10px;min-height:18px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Result cards */
.result-card{background:var(--surface);border:1px solid var(--border);margin-bottom:28px;animation:fadeUp .35s ease forwards;opacity:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border);gap:16px;flex-wrap:wrap;}
.candidate-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
.role-name{font-size:12px;color:var(--accent2);letter-spacing:.5px;margin-top:4px;}
.alumni-badge{font-size:10px;color:var(--strong);border:1px solid var(--strong);padding:2px 8px;margin-top:6px;display:inline-block;letter-spacing:1px;}
.score-num{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.score-num.high{color:var(--strong);}
.score-num.mid{color:var(--warn);}
.score-num.low{color:var(--danger);}
.score-label{font-size:11px;color:var(--muted);letter-spacing:1px;}
.card-body{padding:20px 24px;}
.meta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.pill{font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:4px 12px;border:1px solid;font-weight:500;}
.pill.strong{border-color:var(--strong);color:var(--strong);}
.pill.potential{border-color:var(--warn);color:var(--warn);}
.pill.weak{border-color:var(--danger);color:var(--danger);}
.pill.apply{background:var(--accent);border-color:var(--accent);color:#0a0a0f;}
.pill.networkfirst,.pill.network{border-color:var(--accent2);color:var(--accent2);}
.pill.reposition{border-color:var(--warn);color:var(--warn);}
.pill.skip{border-color:var(--muted);color:var(--muted);}
.pill.aligned{border-color:var(--strong);color:var(--strong);}
.pill.overleveled{border-color:var(--warn);color:var(--warn);}
.pill.underleveled{border-color:var(--accent2);color:var(--accent2);}
.sections-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
@media(max-width:650px){.sections-grid{grid-template-columns:1fr;}}
.section-box{background:var(--surface2);border:1px solid var(--border);padding:14px 16px;}
.section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:500;}
.section-box ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.section-box li{font-size:12px;color:var(--text);padding-left:14px;position:relative;line-height:1.5;}
.section-box li::before{content:'›';position:absolute;left:0;color:var(--accent);}
.section-box.gap li::before{color:var(--danger);content:'!';}
.section-box.improve li::before{color:var(--accent2);content:'↑';}
.section-box.adjacent li::before{color:var(--warn);content:'→';}
.network-box{background:var(--surface2);border:1px solid var(--border);padding:14px 16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:14px;}
.network-strength{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;min-width:48px;}
.net-high{color:var(--strong);}.net-medium{color:var(--warn);}.net-low{color:var(--danger);}
.network-reason{font-size:12px;color:var(--muted);line-height:1.6;}
.pitch-box{background:rgba(200,245,66,.04);border-left:3px solid var(--accent);padding:14px 18px;font-size:13px;color:var(--text);line-height:1.7;font-style:italic;}
/* Alumni contacts */
.alumni-contacts{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.2);padding:14px 16px;margin-bottom:16px;}
.alumni-contacts-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--strong);margin-bottom:8px;font-weight:500;}
.alumni-contact-item{font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid rgba(0,255,136,.1);}
.alumni-contact-item:last-child{border-bottom:none;}
.alumni-contact-name{color:var(--strong);}
.alumni-contact-pos{color:var(--muted);margin-left:8px;}
/* Bulk table */
.bulk-table-wrap{overflow-x:auto;}
.bulk-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:20px;}
.bulk-table th{text-align:left;padding:10px 14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;}
.bulk-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.bulk-table tr:hover td{background:var(--surface2);}
.mini-bar{height:3px;background:var(--border);overflow:hidden;width:60px;display:inline-block;vertical-align:middle;margin-left:8px;}
.mini-bar-fill{height:100%;background:var(--accent);}
.mini-bar-fill.mid{background:var(--warn);}.mini-bar-fill.low{background:var(--danger);}
/* Selects panel */
.select-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.select-grid{grid-template-columns:1fr;}}
/* Stats bar */
.stats-bar{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:32px;}
.stat{background:var(--surface);border:1px solid var(--border);padding:14px 20px;}
.stat-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.5px;}
/* Filters */
.filter-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-row select{width:auto;min-width:160px;padding:8px 12px;}
.filter-label{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="app">
<header>
  <span class="logo-badge">Alumni Engine — Grubhub</span>
  <h1>Placement<br><span>Intelligence</span></h1>
  <p class="subtitle">// 73 laid-off candidates · 169 alumni companies · live job listings</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bulk')">Auto-Match All</button>
  <button class="tab" onclick="switchTab('single')">Single Evaluation</button>
</div>

<!-- AUTO-MATCH PANEL -->

<div class="panel active" id="panel-bulk">
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-cands">73</div><div class="stat-label">Candidates</div></div>
    <div class="stat"><div class="stat-num" id="stat-cos">169</div><div class="stat-label">Alumni Companies</div></div>
    <div class="stat"><div class="stat-num" id="stat-alumni">204</div><div class="stat-label">Placed Alumni (Contacts)</div></div>
    <div class="stat"><div class="stat-num" id="stat-done" style="color:var(--muted)">0</div><div class="stat-label">Evaluated</div></div>
  </div>

  <div class="filter-row">
    <span class="filter-label">Filter by function:</span>
    <select id="filter-function" onchange="filterCandidates()">
      <option value="">All Functions</option>
      <option>Engineering</option>
      <option>Product</option>
      <option>Product Design</option>
      <option>Data & Analytics</option>
      <option>Go to Market</option>
      <option>Marketing</option>
      <option>Operations</option>
      <option>Customer Care &amp; Support</option>
      <option>IT</option>
    </select>
    <span class="filter-label">Target company:</span>
    <select id="filter-company">
      <option value="">All Companies</option>
    </select>
  </div>

  <div class="action-bar">
    <button class="btn-run-all" onclick="runAutoMatch()" id="btn-bulk">⚡ Run Auto-Match</button>
    <button class="btn-secondary" onclick="runAutoMatch(true)" id="btn-preview">▶ Quick Preview (5 candidates)</button>
  </div>
  <div class="loading-bar" id="loading-bulk"></div>
  <div class="status-msg" id="status-bulk"></div>
  <div id="bulk-results" style="margin-top:32px;"></div>
</div>

<!-- SINGLE EVAL PANEL -->

<div class="panel" id="panel-single">
  <div class="section-heading">Select Candidate + Company</div>
  <div class="select-grid">
    <div class="field-group">
      <label>Candidate</label>
      <select id="single-candidate" onchange="onCandidateSelect()">
        <option value="">— Select a candidate —</option>
      </select>
    </div>
    <div class="field-group">
      <label>Target Company</label>
      <select id="single-company" onchange="onCompanySelect()">
        <option value="">— Select a company —</option>
      </select>
    </div>
  </div>
  <div class="input-grid">
    <div class="field-group">
      <label>Candidate Profile <span class="hint">auto-filled · editable</span></label>
      <textarea id="candidate-input" style="min-height:160px;"></textarea>
    </div>
    <div class="field-group">
      <label>Job Listings <span class="hint">auto-filled · editable</span></label>
      <textarea id="job-input" style="min-height:160px;"></textarea>
    </div>
  </div>
  <div id="single-alumni-preview" style="margin-bottom:16px;"></div>
  <div class="action-bar">
    <button class="btn-primary" onclick="runSingleMatch()" id="btn-single">▶ Evaluate Match</button>
  </div>
  <div class="loading-bar" id="loading-single"></div>
  <div class="status-msg" id="status-single"></div>
  <div id="results" style="margin-top:32px;"></div>
</div>
</div>

// ── Claude API ────────────────────────────────────────────────────
async function callClaude(candidateText, jobText, alumniContacts) {
  const alumniCtx = alumniContacts && alumniContacts.length > 0
    ? `\nAlumni network contacts at this company: ${alumniContacts.map(a=>a.name+' ('+a.position+')').join(', ')}`
    : '';

  const systemPrompt = `You are a hiring manager and career strategist specializing in alumni placement networks. The candidates are former Grubhub employees being matched to alumni company job listings.
Evaluate candidate-role fit and return ONLY valid JSON matching this exact schema — no markdown, no backticks, no explanation:
{"match_score":0-100,"match_category":"Strong Match"|"Potential Match"|"Weak Match","seniority_alignment":"Underleveled"|"Aligned"|"Overleveled","top_matches":["","",""],"top_gaps":["","",""],"recommended_action":"Apply"|"Network First"|"Reposition"|"Skip","networking_opportunity":{"strength":"High"|"Medium"|"Low","reason":""},"resume_improvements":["",""],"better_fit_roles":["",""],"recruiter_pitch":""}`;

  const userMsg = `Candidate:\n${candidateText}\n\nJob Listings at Target Company:\n${jobText}${alumniCtx}\n\nContext: Former Grubhub employee. Strong alumni network advantage. Goal: maximize placement.`;

  const resp = await fetch(API_URL, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:'user',content:userMsg}]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  const raw = data.content?.map(b=>b.text||'').join('') || '';
  if (!raw) throw new Error('Empty response from API');
  return JSON.parse(raw.replace(/```json[\s\S]*?```|```/g,'').trim());
}

// ── Render card ───────────────────────────────────────────────────
function renderCard(result, candidateName, roleName, alumniContacts, linkedin) {
  const sc = scoreClass(result.match_score);
  const mc = (result.match_category||'').split(' ')[0].toLowerCase();
  const ac = (result.recommended_action||'').toLowerCase().replace(' ','');
  const netStr = (result.networking_opportunity?.strength||'').toLowerCase();

  const alumniHtml = alumniContacts && alumniContacts.length > 0
    ? `<div class="alumni-contacts"><div class="alumni-contacts-title">🤝 ${alumniContacts.length} Alumni Contact${alumniContacts.length>1?'s':''} at this company</div>${alumniContacts.map(a=>`<div class="alumni-contact-item"><span class="alumni-contact-name">${a.name}</span><span class="alumni-contact-pos">— ${a.position}</span></div>`).join('')}</div>`
    : '';

  const linkedinHtml = linkedin && linkedin !== 'nan' && linkedin.startsWith('http')
    ? `<a href="${linkedin}" target="_blank" style="font-size:11px;color:var(--accent2);text-decoration:none;margin-top:4px;display:block;">↗ LinkedIn</a>`
    : '';

  return `<div class="result-card">
  <div class="card-header">
    <div>
      <div class="candidate-name">${candidateName}</div>
      <div class="role-name">→ ${roleName}</div>
      ${linkedinHtml}
    </div>
    <div style="text-align:right;">
      <div class="score-num ${sc}">${result.match_score}</div>
      <div class="score-label">Match Score</div>
    </div>
  </div>
  <div class="card-body">
    <div class="meta-row">
      <span class="pill ${mc}">${result.match_category}</span>
      <span class="pill ${ac}">${result.recommended_action}</span>
      <span class="pill ${(result.seniority_alignment||'').toLowerCase()}">${result.seniority_alignment}</span>
    </div>
    ${alumniHtml}
    <div class="sections-grid">
      <div class="section-box"><div class="section-title">✓ Top Strengths</div><ul>${(result.top_matches||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="section-box gap"><div class="section-title">! Gaps & Risks</div><ul>${(result.top_gaps||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="section-box improve"><div class="section-title">↑ Resume Improvements</div><ul>${(result.resume_improvements||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="section-box adjacent"><div class="section-title">→ Better-Fit Roles</div><ul>${(result.better_fit_roles||[]).map(x=>`<li>${x}</li>`).join('')}</ul></div>
    </div>
    <div class="network-box">
      <div class="network-strength net-${netStr}">${result.networking_opportunity?.strength||'—'}</div>
      <div><div class="section-title" style="margin-bottom:4px;">Alumni Network Advantage</div><div class="network-reason">${result.networking_opportunity?.reason||''}</div></div>
    </div>
    <div class="pitch-box">${result.recruiter_pitch||''}</div>
  </div>
</div>`;
}

  const fnFilter = document.getElementById('filter-function').value;

  let candidates = PLACEMENT_DATA.candidates.filter(c => !fnFilter || c.function === fnFilter);

    <div id="bulk-cards" style="margin-top:40px;"></div>`;

  const tbody = document.getElementById('bulk-tbody');
  const cardsDiv = document.getElementById('bulk-cards');

  for (let ci = 0; ci < candidates.length; ci++) {

    const candText = `${cand.name}\nTitle: ${cand.title}\nFunction: ${cand.function}\nLocation: ${cand.location}\n${cand.description ? 'Background: '+cand.description : ''}`;

    // Narrow companies to evaluate — use function-relevant subset for speed
    const companiesForCand = coFilter ? [coFilter] : smartCompanyShortlist(cand, targetCompanies, 8);

    let best = null, bestScore = -1, bestCo = '';
    for (const co of companiesForCand) {
      const listing = PLACEMENT_DATA.job_listings[co];
      if (!listing || listing === 'nan') continue;
      const alumni = PLACEMENT_DATA.company_alumni_map[co] || [];
      try {
        const r = await callClaude(candText, `Company: ${co}\n${listing}`, alumni);
        if (r.match_score > bestScore) {
          bestScore = r.match_score; best = r; bestCo = co;
        }
      } catch(e) { console.warn('Match error for', co, e.message); }
    }

    done++;
    document.getElementById('stat-done').textContent = done;
    setLoading('bulk', true, `Evaluated ${done}/${candidates.length} candidates...`);

    if (best) {
      allResults.push({cand, bestCo, best});
      const sc = scoreClass(best.match_score);
      const mc = (best.match_category||'').split(' ')[0].toLowerCase();
      const alumni = PLACEMENT_DATA.company_alumni_map[bestCo]||[];
      tr.innerHTML = `
        <td style="font-family:'Syne',sans-serif;font-weight:700;">${cand.name}</td>
        <td style="color:var(--muted);font-size:11px;">${cand.function}</td>
        <td style="color:var(--accent2);font-size:12px;">${bestCo}</td>
        <td><span class="score-num ${sc}" style="font-size:20px;">${best.match_score}</span>
        <span class="mini-bar"><span class="mini-bar-fill ${barClass(best.match_score)}" style="width:${best.match_score}%"></span></span></td>
        <td><span class="pill ${mc}" style="font-size:10px;">${best.match_category}</span></td>
        <td><span class="pill ${(best.recommended_action||'').toLowerCase().replace(' ','')}" style="font-size:10px;">${best.recommended_action}</span></td>
        <td><span class="net-${(best.networking_opportunity?.strength||'').toLowerCase()}" style="font-weight:700;font-size:12px;font-family:'Syne',sans-serif;">${best.networking_opportunity?.strength||'—'}</span></td>
        <td style="font-size:11px;color:var(--strong);">${alumni.length > 0 ? alumni.length+' contact'+( alumni.length>1?'s':'') : '<span style=\'color:var(--muted)\'>none</span>'}</td>`;
    } else {
      tr.innerHTML = `<td>${cand.name}</td><td>${cand.function}</td><td colspan="6" style="color:var(--danger);">Could not evaluate</td>`;
    }
  }

  // Render cards sorted by score
  if (allResults.length > 0) {
    cardsDiv.innerHTML = `<div class="section-heading">Detailed Evaluations — Ranked by Score</div>`;
    allResults.sort((a,b) => b.best.match_score - a.best.match_score).forEach(({cand, bestCo, best}) => {
      const alumni = PLACEMENT_DATA.company_alumni_map[bestCo]||[];
      cardsDiv.innerHTML += renderCard(best, cand.name, bestCo, alumni, cand.linkedin);
    });
  }

  setLoading('bulk', false, `✓ Complete — ${done} candidates evaluated.`);
  btn.disabled = false; btn2.disabled = false;
}

// Smart shortlist: pick relevant companies by function keyword matching
function smartCompanyShortlist(cand, allCos, n) {
  const fnMap = {
    'Engineering': ['flock','grindr','doordash','hinge','gusto','spotify','rippling','chess','braze','angi','zeta','act blue','google'],
    'Data & Analytics': ['doordash','gusto','morning star','zoominfo','chess','angi','breeze','integral ad','arrowstream','inspire 11','mongoldb','mongo'],
    'Product': ['doordash','gusto','spotify','hubspot','monday','grubhub','tulip','yelp','toast','wonder','peleton'],
    'Product Design': ['gusto','fidelity','capital rx','fis','hungryroot','etsy','flow','q-ctrl','polycam','braze'],
    'Go to Market': ['yelp','doordash','angi','zendesk','braze','zoominfo','rippling','hubspot','indeed','monday','wonder','woflow','engine'],
    'Marketing': ['braze','zendesk','yelp','hubspot','zoominfo','fanduel','draft kings','expedia'],
    'Operations': ['doordash','roadie','on course','echo global','us foods','wonder','fanduel','breeze airways','oura'],
    'Customer Care & Support': ['doordash','yelp','zendesk','kustomer','idexx','embrace pet','on course','flock safety','rippling','wonder','angi'],
    'IT': ['adp','cdw','servicenow','lrs','sayers','acrisure','guggenheim','mount sinai','spaceX']
  };

  const keywords = (fnMap[cand.function] || []).map(k=>k.toLowerCase());
  const preferred = allCos.filter(co => keywords.some(k => co.toLowerCase().includes(k)));
  const rest = allCos.filter(co => !preferred.includes(co));

  // Also boost companies with alumni
  const withAlumni = rest.filter(co => (PLACEMENT_DATA.company_alumni_map[co]||[]).length > 0);
  const noAlumni = rest.filter(co => (PLACEMENT_DATA.company_alumni_map[co]||[]).length === 0);

  return [...preferred, ...withAlumni, ...noAlumni].slice(0, n);
}

// ── Single match ──────────────────────────────────────────────────
async function runSingleMatch() {
  const candidate = document.getElementById('candidate-input').value.trim();
  const job = document.getElementById('job-input').value.trim();
  if (!candidate || !job) { document.getElementById('status-single').textContent='Fill in both fields.'; return; }

  const coSel = document.getElementById('single-company').value;
  const alumni = coSel ? (PLACEMENT_DATA.company_alumni_map[coSel]||[]) : [];
  const candIdx = document.getElementById('single-candidate').value;
  const candObj = candIdx !== '' ? PLACEMENT_DATA.candidates[candIdx] : null;

  const btn = document.getElementById('btn-single');
  btn.disabled = true;
  setLoading('single', true, 'Evaluating match...');
  document.getElementById('results').innerHTML = '';

  try {
    const result = await callClaude(candidate, job, alumni);
    const cName = candObj ? candObj.name : (candidate.split('\n')[0].split('—')[0].trim());
    const rName = coSel || job.split('\n')[0].replace('Company:','').trim();
    document.getElementById('results').innerHTML = renderCard(result, cName, rName, alumni, candObj?.linkedin||'');
    setLoading('single', false, '');
  } catch(e) {
    setLoading('single', false, `<span style='color:var(--danger)'>✗ Error: ${e.message}</span>`);
    console.error('Single match error:', e);
  }
  btn.disabled = false;
}
